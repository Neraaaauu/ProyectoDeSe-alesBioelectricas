<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador ECG | Glassmorphism Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fcead9 0%, #e2eeea 100%);
            --primary: #15658f;
            --primary-dark: #0f4a6b;
            --panel-bg: rgba(255, 255, 255, 0.7);
            --panel-border: rgba(255, 255, 255, 0.8);
            --radius: 24px;
            --font-main: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }

        body {
            margin: 0;
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 {
            color: var(--primary-dark);
            font-weight: 800;
            text-align: center;
            margin: 0;
            font-size: 2rem;
        }

        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 16px;
            margin-bottom: 25px;
            padding: 10px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        #seccionInfe {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        button#resetBtn {
            padding: 14px 30px;
            border-radius: 50px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(21, 101, 143, 0.3);
            font-size: 1rem;
        }

        button#resetBtn:hover {
            background: var(--primary-dark);
            transform: scale(1.1) translateY(-3px); 
            box-shadow: 0 8px 25px rgba(21, 101, 143, 0.4);
        }

        #derivaciones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 16px;
        }

        #derivaciones label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        #InfoGen {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 20px;
        }

        #InfoGen label { font-size: 0.95rem; color: #333; }
        strong { color: var(--primary-dark); }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Electrocardiograma</h2>

        <div class="card">
            <div class="chart-container">
                <canvas id="OndaChart"></canvas>
            </div>

            <div id="seccionInfe">
                <button id="resetBtn" onclick="resetZoom()">Restablecer Zoom</button>

                <section id="derivaciones">
                    <label><input type="checkbox" id="V1"> Derivación V1</label>
                    <label><input type="checkbox" id="V4"> Derivación V4</label>
                    <label><input type="checkbox" id="D1"> Derivación DI</label>
                    <label><input type="checkbox" id="aVL"> Derivación aVL</label>
                    <label><input type="checkbox" id="V2"> Derivación V2</label>
                    <label><input type="checkbox" id="V5"> Derivación V5</label>
                    <label><input type="checkbox" id="D2"> Derivación DII</label>
                    <label><input type="checkbox" id="aVR"> Derivación aVR</label>
                    <label><input type="checkbox" id="V3"> Derivación V3</label>
                    <label><input type="checkbox" id="V6"> Derivación V6</label>
                    <label><input type="checkbox" id="D3"> Derivación DIII</label>
                    <label><input type="checkbox" id="aVF"> Derivación aVF</label>
                </section>

                <section id="InfoGen">
                    <label><strong>Nombre:</strong> Juan Pérez</label>
                    <label><strong>Edad:</strong> 45 años</label>
                    <label><strong>Sexo:</strong> Masculino</label>
                    <label><strong>ID:</strong> #88234</label>
                    <label><strong>Fecha:</strong> 18/03/2024</label>
                </section>
            </div>
        </div>
    </div>

    <script>
        
        const Patron = [0, 0.02, 0.04, 0.02, 0, -0.03, -0.05, 0.1, 1, -0.3, 0.05, 0.08, 0.05, 0.02, 0];
        let InfoOnda = [];
        while(InfoOnda.length < 1000) { InfoOnda = InfoOnda.concat(Patron); }
        InfoOnda = InfoOnda.slice(0, 1000);

        const etiquetas = Array.from({length: 1000}, (_, i) => i);
        const ctx = document.getElementById('OndaChart').getContext('2d');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: etiquetas,
                datasets: [{
                    label: 'Señal ECG',
                    data: InfoOnda,
                    borderColor: '#15658f',
                    borderWidth: 2,
                    tension: 0.2,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: "#333", font: { family: 'Outfit' } } },
                    zoom: {
                        pan: { enabled: true, mode: 'x' },
                        zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
                    }
                },
                scales: {
                    x: { ticks: { color: "#666" }, grid: { color: "rgba(0,0,0,0.05)" } },
                    y: { min: -0.5, max: 1.2, ticks: { color: "#666" }, grid: { color: "rgba(0,0,0,0.05)" } }
                }
            }
        });

        function resetZoom() {
            chart.resetZoom();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Señales Bioeléctricas (ECG) | Modern Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fcead9 0%, #e2eeea 100%);
            

            --primary: #15658f;
            --primary-dark: #0f4a6b;
            --accent: #4d91ff;
            
            /* Glassmorphism y sombras */
            --panel-bg: rgba(255, 255, 255, 0.65);
            --panel-border: rgba(255, 255, 255, 0.8);
            --border: rgba(21, 101, 143, 0.15);
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            
            /* Radios y tipografía */
            --radius: 24px;
            --radius-sm: 12px;
            --font-main: 'Outfit', sans-serif;
            --text-main: #1a202c;
            --text-muted: #5d6964;
        }

        /* --- RESET Y BASE --- */
        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            margin: 0;
            font-family: var(--font-main);
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- CONTENEDORES --- */
        .app-container {
            width: 100%;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-dark);
            font-weight: 800;
            text-align: center;
            font-size: 2rem;
        }

        /* --- TARJETA GLASSMORPHISM (El efecto cristal) --- */
        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow), inset 0 0 0 1px var(--panel-border);
        }

        .card:hover {
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12);
        }

        /* --- ESTILOS DE LA GRÁFICA (Canvas) --- */
        canvas#OndaChart {
            width: 100% !important;
            height: auto !important;
            border-radius: var(--radius-sm);
            background: #fff; /* Asegura fondo blanco para que resalte la línea */
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 1.5rem;
        }

        /* --- SECCIÓN INFERIOR Y BOTÓN CON ZOOM --- */
        #seccionInfe {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        /* El botón principal "Restablecer Zoom" */
        button#resetBtn {
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(21, 101, 143, 0.2);
            font-size: 1rem;
        }

        /* EFECTO ZOOM Y CAMBIO DE COLOR (Como pediste) */
        button#resetBtn:hover {
            background: var(--primary-dark);
            transform: scale(1.06) translateY(-3px);
            box-shadow: 0 8px 20px rgba(21, 101, 143, 0.35);
        }

        /* --- CUADRÍCULA DE DERIVACIONES (Checkboxes) --- */
        #derivaciones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            padding: 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(0,0,0,0.03);
        }

        #derivaciones label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text-muted);
            user-select: none;
        }

        /* Arreglamos los inputs para que no se estiren */
        #derivaciones input[type="checkbox"] {
            margin: 0;
            width: 18px;
            height: 18px;
            accent-color: var(--accent); /* Cambia el color del checkmark */
        }

        /* --- INFORMACIÓN GENERAL --- */
        #InfoGen {
            text-align: left;
            width: 100%;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #InfoGen label {
            font-size: 1rem;
            color: var(--text-main);
        }

        #InfoGen strong {
            color: var(--primary-dark);
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <h2>Electrocardiograma</h2>

        <div class="card">
            <canvas id="OndaChart" width="900" height="250"></canvas>
            
            <div id="seccionInfe">
                <button id="resetBtn" onclick="resetZoom()">Restablecer Zoom</button>

                <section id="derivaciones">
                    <label for="V1"><input type="checkbox" id="V1"> Derivación V1</label>
                    <label for="V4"><input type="checkbox" id="V4"> Derivación V4</label>
                    <label for="D1"><input type="checkbox" id="D1"> Derivación DI</label>
                    <label for="aVL"><input type="checkbox" id="aVL"> Derivación aVL</label>
                    
                    <label for="V2"><input type="checkbox" id="V2"> Derivación V2</label>        
                    <label for="V5"><input type="checkbox" id="V5"> Derivación V5</label>                
                    <label for="D2"><input type="checkbox" id="D2"> Derivación DII</label>             
                    <label for="aVR"><input type="checkbox" id="aVR"> Derivación aVR</label>
                    
                    <label for="V3"><input type="checkbox" id="V3"> Derivación V3</label>
                    <label for="V6"><input type="checkbox" id="V6"> Derivación V6</label>            
                    <label for="D3"><input type="checkbox" id="D3"> Derivación DIII</label>              
                    <label for="aVF"><input type="checkbox" id="aVF"> Derivación aVF</label> 
                </section>
                
                <section id="InfoGen">
                    <label id="nombre"><strong>Nombre:</strong></label>
                    <label id="edad"><strong>Edad:</strong></label>
                    <label id="sexo"><strong>Sexo:</strong></label>
                    <label id="id"><strong>ID:</strong></label>
                    <label id="fecha"><strong>Fecha de registro:</strong></label>  
                </section>  
            </div>
        </div>

    </div> <script src="./Onda.js"></script>
</body>
</html>
